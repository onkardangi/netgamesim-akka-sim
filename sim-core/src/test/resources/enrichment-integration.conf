# Integration test: matches sample-netgamesim.json (nodes 0,1,2 and edges 0→1, 1→2)
sim.enrichment {
  messageTypes = [alpha, beta, gamma]
  defaultPdf {
    preset = uniform
  }
  perNodePdf {
    "1" {
      preset = zipf
      # Zipf exponent over ranks in messageTypes list order (see PdfPreset.zipf).
      s = 1.0
    }
  }
  defaultEdgeLabel = alpha
  perEdgeLabels {
    "0_1" = beta
    "1_2" = gamma
  }
}
