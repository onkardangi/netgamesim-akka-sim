# Lai–Yang on a NetGameSim-generated graph: every directed edge allows LY_MARKER so the marker can propagate.
# "App" traffic (WORK) is not routed unless you add perEdgeLabels for specific edges — see docs/experiments.md.
# Replace --graph with your generated .ngs path.

sim.enrichment {
  messageTypes = [WORK, LY_MARKER]
  defaultPdf { preset = uniform }
  defaultEdgeLabel = LY_MARKER
}

sim.runtime {
  seed = 42
  algorithms = ["lai-yang"]
  algorithmInitiators = [0]
  initiators.timers = []
}
