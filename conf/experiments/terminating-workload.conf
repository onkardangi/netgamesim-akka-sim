# Example: terminating workload (FIFO WORK queue) + optional drain-wait.
# Run: sbt "sim-cli/run -- --graph <path> --config conf/experiments/terminating-workload.conf --duration-ms 60000"
#
# With waitForDrain = true, SimMain exits early when in-flight counts hit 0 and
# every node's WORK queue depth is 0 (capped by --duration-ms).

sim.runtime {
  seed = 0
  terminatingWorkload {
    enabled = true
    perNodeWorkUnits {
      "1" = 5
      "2" = 3
    }
    waitForDrain = true
  }
}
