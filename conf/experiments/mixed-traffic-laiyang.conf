sim.enrichment {
  messageTypes = [WORK, PING, LY_MARKER]
  defaultPdf { preset = uniform }
  defaultEdgeLabel = PING
  perEdgeLabels {
    "0_1" = WORK
    "1_2" = LY_MARKER
  }
}

sim.runtime {
  seed = 99
  algorithms = [ "lai-yang" ]
  algorithmInitiators = [1]
  initiators {
    timers = [
      { node = 0, tickEveryMs = 75, mode = "fixed", fixedMsg = "WORK" }
    ]
  }
}
