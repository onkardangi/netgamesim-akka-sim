# Use with graphs from NetGameSim where edge ids are unknown: only default labels (no perEdgeLabels).
# Example: outputs/netgamesim-generated/generated-sample.ngs

sim.enrichment {
  messageTypes = [WORK]
  defaultPdf { preset = uniform }
  defaultEdgeLabel = WORK
}

sim.runtime {
  seed = 42
  initiators {
    timers = [
      { node = 0, tickEveryMs = 200, mode = "fixed", fixedMsg = "WORK" }
    ]
  }
}
