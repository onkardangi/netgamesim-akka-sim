sim.enrichment {
  messageTypes = [WORK, PING, LY_MARKER]
  defaultPdf { preset = uniform }
  defaultEdgeLabel = WORK
  perEdgeLabels {
    "0_1" = WORK
    "1_2" = LY_MARKER
  }
}

sim.runtime {
  algorithms = [ "lai-yang" ]
  algorithmInitiators = [ 1 ]
  initiators {
    timers = [
      { node = 0, tickEveryMs = 100, mode = "fixed", fixedMsg = "WORK" }
    ]
  }
}
