sim.enrichment {
  messageTypes = [WORK, PING]
  defaultPdf {
    preset = uniform
  }
  defaultEdgeLabel = WORK
  perEdgeLabels {
    "0_1" = WORK
  }
}

sim.runtime {
  algorithms = [ "lai-yang" ]
  algorithmInitiators = [ 0 ]
  initiators {
    timers = [
      { node = 0, tickEveryMs = 100, mode = "fixed", fixedMsg = "WORK" }
    ]
  }
}
