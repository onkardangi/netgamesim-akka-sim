# Sim CLI entrypoint: this file is on the classpath when running `sim-cli/runMain`.
# It merges with sim-runtime-akka's application.conf. Experiment-specific settings
# (`sim.enrichment`, `sim.runtime`, …) are loaded from the `--config` HOCON file in SimMain.

akka {
  loglevel = INFO
  stdout-loglevel = INFO
}
