# Akka Classic defaults for netgamesim simulation (ActorSystem created in GraphRuntimeBuilder).
# Graph topology, enrichment, algorithms, and `sim.runtime.seed` still come from the HOCON
# file passed to sim-cli (`--config`), not from this file.

akka {
  loggers = ["akka.event.slf4j.Slf4jLogger"]
  logging-filter = "akka.event.slf4j.Slf4jLoggingFilter"
  loglevel = INFO
  stdout-loglevel = INFO
  log-dead-letters = off
  log-dead-letters-during-shutdown = off

  actor {
    allow-java-serialization = off
    warn-about-java-serializer-usage = on

    debug {
      lifecycle = off
      unhandled = off
      receive = off
    }

    default-dispatcher {
      fork-join-executor {
        parallelism-min = 2
        parallelism-factor = 1.0
        parallelism-max = 64
      }
    }
  }
}
